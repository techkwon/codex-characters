name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example desktop-v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            artifact-name: highlearning-pet-reminder-macos-arm64
            build-args: --target aarch64-apple-darwin
            portable-command: npm run package:portable:mac
            artifact-paths: |
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/portable/*.zip
          - name: Windows x64
            os: windows-2025-vs2026
            artifact-name: highlearning-pet-reminder-windows-x64
            build-args: ""
            portable-command: npm run package:portable:win
            artifact-paths: |
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi
              apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
              apps/desktop/src-tauri/target/release/bundle/portable/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS arm64 Rust target
        if: matrix.os == 'macos-14'
        run: rustup target add aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Typecheck UI
        working-directory: apps/desktop
        run: npm run typecheck

      - name: Check release metadata
        working-directory: apps/desktop
        run: npm run release:check

      - name: Check signing readiness
        working-directory: apps/desktop
        env:
          REQUIRE_SIGNING: ${{ vars.REQUIRE_SIGNING }}
        run: node scripts/check-signing-readiness.mjs

      - name: Check Rust
        working-directory: apps/desktop/src-tauri
        run: cargo check

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: ${{ matrix.build-args }}

      - name: Package portable app
        working-directory: apps/desktop
        run: ${{ matrix.portable-command }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-paths }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^desktop-v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid desktop release tag: $tag" >&2
            exit 1
          fi
          version="${tag#desktop-v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check release notes version
        shell: bash
        run: |
          grep -q "HighLearning Pet Reminder ${{ steps.release.outputs.version }}" apps/desktop/RELEASE_NOTES.md

      - name: Download desktop artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p dist-release
          find release-assets -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.msi" -o -name "*.exe" \) -print0 |
            while IFS= read -r -d '' file; do
              cp "$file" dist-release/
            done
          find dist-release -type f -maxdepth 1 -print
          test "$(find dist-release -type f | wc -l)" -ge 4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: HighLearning Pet Reminder ${{ steps.release.outputs.version }}
          body_path: apps/desktop/RELEASE_NOTES.md
          files: dist-release/*
          draft: false
          prerelease: ${{ contains(steps.release.outputs.version, '-') }}
